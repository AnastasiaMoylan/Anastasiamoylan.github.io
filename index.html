
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Anastasia Novelly Moylan&#39;s portfolio</title>
      <meta name="description" content="This web application offers a streamlined interface for users to navigate and interact with content, utilizing clean coding practices for optimal performance." />
      <script type="text/javascript">
        // Counterpart to public/404.html's redirect: restores the original
        // deep-linked path before React Router mounts.
        (function (l) {
          if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function (s) {
              return s.replace(/~and~/g, '&');
            }).join('?');
            window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
          }
        }(window.location));
      </script>

      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
